<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            margin: 0;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #36d1dc;
        }

        button {
            width: 95%;
            padding: 12px;
            margin-top: 10px;
            background: #36d1dc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #2bbac6;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #36d1dc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .title {
            color: white;
            text-align: center;
            margin-top: 40px;
            font-size: 28px;
            font-weight: bold;
        }
    </style>

</head>
<body>

<div class="title">Online Auction System</div>

<div class="container">
    <h2>Login</h2>

    <form action="/login_user" method="POST">
        <input type="email" name="email" placeholder="Enter Email" required>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

    <a href="/">Don't have an account? Register</a>
</div>

</body>
</html>
